---
name: Release
run-name: "Release"

on:
  workflow_dispatch:

jobs:
  # 🔢 Finalize VERSION (drop the build suffix)
  version:
    runs-on: ubuntu-latest
    concurrency: version-bump-development  # serialize VERSION changes against deploy.yml's bumps
    permissions:
      contents: write  # repo default GITHUB_TOKEN permission is read-only; this job needs to push a branch
      pull-requests: write  # 'development' requires changes via PR (0 required reviews) — no direct push allowed
      actions: write  # renaming the run needs write too
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: development

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install Dependencies
        run: uv sync

      - name: Finalize VERSION for release
        id: bump
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          uv run --no-sync invoke version.bump_release
          new_version="$(cat VERSION)"
          echo "version=$new_version" >> "$GITHUB_OUTPUT"
          branch="chore/release-version-${{ github.run_id }}"
          git checkout -b "$branch"
          git add VERSION
          git commit -m "chore: release v$new_version"
          git push origin "$branch"
          gh pr create --repo "${{ github.repository }}" --base development --head "$branch" \
            --title "chore: release v$new_version" \
            --body "Automated VERSION finalize for release v$new_version."
          gh pr merge --repo "${{ github.repository }}" "$branch" --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set run name
        run: |
          gh api --method PATCH "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f display_title="Release (v${{ steps.bump.outputs.version }})"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 🔀 Promote development → main
  promote:
    needs: version
    uses: ./.github/workflows/promote.yml
    permissions:
      contents: write  # repo default GITHUB_TOKEN permission is read-only; the called workflow needs to push to main
    secrets: inherit

  # 🚀 Deploy to production
  deploy:
    needs: promote
    uses: ./.github/workflows/deploy.yml
    with:
      env: prd
    secrets: inherit

  # 🏷️ Create GitHub Release
  release:
    needs: [version, deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # repo default GITHUB_TOKEN permission is read-only; creating a release needs write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main  # tag the freshly promoted merge commit, not the dispatch ref

      - name: Create GitHub Release
        run: >-
          gh release create "v${{ needs.version.outputs.version }}"
          --target main
          --title "v${{ needs.version.outputs.version }}"
          --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
