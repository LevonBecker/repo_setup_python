---
name: Release
run-name: "Release"

on:
  workflow_dispatch:

jobs:
  # 🔢 Finalize VERSION (drop the build suffix)
  version:
    runs-on: ubuntu-latest
    concurrency: version-bump-development  # serialize VERSION changes against deploy.yml's bumps
    permissions:
      contents: read  # pushes go through the bot token, not GITHUB_TOKEN
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      # GITHUB_TOKEN may not push to development (PR-required branch); the bot app
      # bypasses that protection. See docs/howtos/create_actions_bot.md
      - name: Generate bot token
        id: bot-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v7
        with:
          ref: development
          # persist the bot token for git auth — checkout's default GITHUB_TOKEN
          # extraheader overrides any token embedded in a push URL
          token: ${{ steps.bot-token.outputs.token }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install Dependencies
        run: uv sync

      - name: Finalize VERSION for release
        id: bump
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          uv run --no-sync invoke version.bump_release
          new_version="$(cat VERSION)"
          echo "version=$new_version" >> "$GITHUB_OUTPUT"
          git add VERSION
          # [skip ci]: bot-token pushes DO trigger workflows (unlike GITHUB_TOKEN),
          # so without it this push to development would trigger a dev Deploy
          git commit -m "chore: release v$new_version [skip ci]"
          git push origin HEAD:development

      # runs can't be renamed after the fact (no such API endpoint, and run-name is
      # fixed at trigger time — before the bump); surface the version in the summary
      - name: Report version
        run: echo "### Releasing v${{ steps.bump.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"

  # 🔀 Promote development → main
  promote:
    needs: version
    uses: ./.github/workflows/promote.yml
    permissions:
      contents: write  # repo default GITHUB_TOKEN permission is read-only; the called workflow needs to push to main
    secrets: inherit

  # 🚀 Deploy to production
  deploy:
    needs: promote
    uses: ./.github/workflows/deploy.yml
    with:
      env: prd
    secrets: inherit

  # 🏷️ Create GitHub Release
  release:
    needs: [version, deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # repo default GITHUB_TOKEN permission is read-only; creating a release needs write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main  # tag the freshly promoted merge commit, not the dispatch ref

      - name: Create GitHub Release
        run: >-
          gh release create "v${{ needs.version.outputs.version }}"
          --target main
          --title "v${{ needs.version.outputs.version }}"
          --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
