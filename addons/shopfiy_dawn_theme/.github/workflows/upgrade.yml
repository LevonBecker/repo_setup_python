---
name: Upgrade
run-name: "Upgrade (${{ github.head_ref || github.ref_name }})"

on:
  workflow_dispatch:  # Manual trigger only
    inputs:
      version:
        description: 'Upstream Dawn tag to sync to (e.g. v15.5.0)'
        required: true
        type: string

jobs:
  # 🔄 Sync dawn_vanilla with upstream Shopify/dawn
  upgrade_dawn_vanilla:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # repo default GITHUB_TOKEN permission is read-only; this job needs to push to dawn_vanilla
    steps:
      - uses: actions/checkout@v7
        with:
          ref: dawn_vanilla
          fetch-depth: 0    # Full history so dawn_vanilla/upstream share a discoverable common ancestor

      - name: Merge upstream Shopify/dawn ${{ inputs.version }} into dawn_vanilla
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git remote add upstream https://github.com/Shopify/dawn.git
          # Fetch only the requested tag — fetching --tags pulls every upstream Dawn version
          # tag, which can collide with our own same-named release tags (e.g. v1.0.0 exists
          # both as a Fireball release tag and an old upstream Dawn version).
          git fetch upstream "refs/tags/${{ inputs.version }}:refs/tags/${{ inputs.version }}"
          # -X theirs: upstream is the source of truth on dawn_vanilla; on conflict its side wins
          git merge "${{ inputs.version }}" --no-ff -X theirs -m "chore: sync dawn_vanilla with upstream Shopify/dawn ${{ inputs.version }}"
          git push origin dawn_vanilla
          git push origin "refs/tags/${{ inputs.version }}"

# Bringing dawn_vanilla's changes onto development is a manual step from here —
# run `uv run --no-sync invoke dawn.upgrade` (or `/dawn upgrade`) locally. That step almost always
# hits real conflicts with Fireball customizations, which need a human/AI reviewing the actual
# diff, not a CI job blindly auto-resolving or failing silently. See versioning.instructions.md.
