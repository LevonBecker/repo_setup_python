---
# template_python Properties
# Central configuration for all scripts and automation
# Copy this file into any project that uses this repo skeleton

repo:
  local: "$HOME/Development/levonbecker/template_python"
  remote: "github.com/LevonBecker/template_python"

# Where /sync-setup pulls skeleton updates from. Leave these pointing at template_python even in
# projects that copied this file in — only `repo:` above should change per-project.
skeleton:
  local: "$HOME/Development/levonbecker/template_python"
  remote: "github.com/LevonBecker/template_python"
