          python-version: "3.14"

      - name: Install Dependencies
        run: uv sync

      - name: Ruff Lint
        run: |
            uv run --no-sync invoke debug.env
            uv run --no-sync invoke tests.rufflint

  pylint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check Out Code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Install Dependencies
        run: uv sync

      - name: Pylint
        run: |
            uv run --no-sync invoke debug.env
            uv run --no-sync invoke tests.pylint

  yaml_lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check Out Code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Install Dependencies
        run: uv sync

      - name: Yaml Lint
        run: |
            uv run --no-sync invoke debug.env
            uv run --no-sync invoke tests.yamllint
