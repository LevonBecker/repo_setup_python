---
name: Tests
run-name: "Tests (${{ github.head_ref || github.ref_name }})"

on:
  push:
    branches:
      - main  # Trigger on pushes to the main branch

jobs:
  # https://github.com/rhysd/actionlint
  action_lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check Out Code
        uses: actions/checkout@v7

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.14"

      - name: Install Dependencies
        run: uv sync

      - name: Action Lint
        run: |
            uv run --no-sync invoke debug.env
            uv run --no-sync invoke tests.actionlint

  pylint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check Out Code
        uses: actions/checkout@v7

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install Dependencies
        run: uv sync

      - name: Pylint
        run: |
          uv run --no-sync invoke debug.env
          uv run --no-sync invoke tests.pylint

  ruff_lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check Out Code
        uses: actions/checkout@v7

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install Dependencies
        run: uv sync

      - name: Ruff Lint
        run: |
          uv run --no-sync invoke debug.env
          uv run --no-sync invoke tests.rufflint

  yaml_lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check Out Code
        uses: actions/checkout@v7

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.14"

      - name: Install Dependencies
        run: uv sync

      - name: Yaml Lint
        run: |
            uv run --no-sync invoke debug.env
            uv run --no-sync invoke tests.yamllint
