---
name: Tests

on:
  workflow_call:

jobs:
  # https://github.com/rhysd/actionlint
  action_lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check Out Code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Install Dependencies
        run: uv sync

      - name: Action Lint
        run: |
            uv run --no-sync invoke debug.env
            uv run --no-sync invoke tests.actionlint

  ruff_lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check Out Code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
