---
name: Deploy to Production

on:
  workflow_call:      # allows calling from release.yml
  workflow_dispatch:  # allows manual triggering

jobs:
  # 🚀 Deploy job
  deploy_prd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g @shopify/cli @shopify/theme

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Dependencies
        run: uv sync

      # Actual deploy
      - name: Deploy to Production Theme
        run: |
          uv run --no-sync invoke debug.env
          uv run --no-sync invoke shopify.deploy --env=prd
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_FLAG_STORE }}
          SHOPIFY_THEME_ID_PRD: ${{ secrets.SHOPIFY_THEME_ID_PRD }}
