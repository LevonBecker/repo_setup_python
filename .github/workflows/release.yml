---
name: Release
run-name: "Release (${{ github.head_ref || github.ref_name }})"

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (i.e. 1.0.0)'
        required: true

jobs:
  # 🔀 Promote development → main
  promote:
    uses: ./.github/workflows/promote.yml
    permissions:
      contents: write  # repo default GITHUB_TOKEN permission is read-only; the called workflow needs to push to main
    secrets: inherit

  # 🚀 Deploy to production
  deploy:
    needs: promote
    uses: ./.github/workflows/deploy.yml
    with:
      env: prd
    secrets: inherit

  # 🏷️ Create GitHub Release
  release:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write  # repo default GITHUB_TOKEN permission is read-only; creating a release needs write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main  # tag the freshly promoted merge commit, not the dispatch ref

      - name: Create GitHub Release
        run: >-
          gh release create "v${{ github.event.inputs.version }}"
          --target main
          --title "v${{ github.event.inputs.version }}"
          --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
