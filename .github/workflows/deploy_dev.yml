---
name: Deploy to Development

on:
  workflow_call:       # allows calling from merge_to_dev.yml
  workflow_dispatch:   # allows manual triggering

jobs:
  # 🚀 Deploy job
  deploy_dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g @shopify/cli @shopify/theme

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Dependencies
        run: uv sync

      # Deploy to development theme
      - name: Deploy to Development Theme
        run: |
          uv run --no-sync invoke debug.env
          uv run --no-sync invoke shopify.deploy --env=dev
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_FLAG_STORE }}
          SHOPIFY_THEME_ID_DEV: ${{ secrets.SHOPIFY_THEME_ID_DEV }}
