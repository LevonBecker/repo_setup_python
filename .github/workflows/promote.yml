---
name: Promote
run-name: "Promote (${{ github.head_ref || github.ref_name }})"

on:
  workflow_call:       # allows calling from release.yml
  workflow_dispatch:   # Manual trigger only

jobs:
  # 🚀 Promote to Production
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # repo default GITHUB_TOKEN permission is read-only; this job needs to push to main
    steps:
      - uses: actions/checkout@v7
        with:
          ref: development  # Checkout development branch
          fetch-depth: 0    # Full history so main/development share a discoverable common ancestor

      # Merge development into main
      - name: Merge development to main
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git fetch origin main
          git checkout main
          # -X theirs: development is the source of truth; on conflict its side wins
          git merge origin/development --no-ff -X theirs -m "chore: release to production"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
